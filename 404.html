<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — SDR GROW</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to SDR GROW to explore our outbound system for recruitment agencies.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#20A7C7">
  
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/logo.png">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.min.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-77X4J912VN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-77X4J912VN');
  </script>

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(32,167,199,0.12), transparent 70%);
      pointer-events: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
      padding: 32px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.25;
      margin-bottom: -20px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .error-desc {
      font-family: var(--font-paragraph);
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      max-width: 420px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-ghost {
      padding: 12px 28px;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">This page doesn't exist or has been moved. Let's get you back to building pipeline.</p>
      <div class="error-actions">
        <a href="/" class="btn-primary">← Back to Home</a>
        <a href="/#book-call" class="btn-ghost">Book a Strategy Call</a>
      </div>
    </div>
  </div>
</body>
</html>
